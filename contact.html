<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Askreview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a href="index.html" class="brand">Ask<span>review</span></a>
        <nav>
          <a href="why-digital-vyapari.html">Why Askreview</a>
          <a href="packages.html">Packages</a>
          <a href="how-it-works.html">How It Works</a>
          <a href="contact.html">Contact</a>
          <a href="contact.html" class="btn btn-small">Get Started</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="contact section">
        <div class="container contact-wrap">
          <div class="reveal-up">
            <p class="eyebrow">Let’s Talk</p>
            <h2>Ready to Grow with Askreview?</h2>
            <p>
              Fill out the form and our team will call you back with a live
              demo.
            </p>
          </div>
          <form class="contact-form reveal-up delay-1" action="#" method="post">
            <label>
              Name
              <input type="text" name="name" placeholder="Your name" required />
            </label>
            <label>
              Phone
              <input type="tel" name="phone" placeholder="Your phone number" required />
            </label>
            <label>
              Business Type
              <input type="text" name="business" placeholder="e.g. Cafe, Salon" required />
            </label>
            <label>
              Message
              <textarea
                name="message"
                rows="4"
                placeholder="Tell us about your business goals"
              ></textarea>
            </label>
            <button type="submit" class="btn btn-block">Submit</button>
          </form>
        </div>
      </section>
    </main>

    <a class="whatsapp-float" href="https://wa.me/919999999999" target="_blank" rel="noopener noreferrer">WhatsApp Us</a>
  </body>
</html>
